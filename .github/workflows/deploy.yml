name: Nightly Atmotube Sync and Deploy

on:
  schedule:
    # Run every day at Midnight UTC (which is 7:00 AM in Vietnam Time, GMT+7. 
    # If you want Midnight Vietnam Time, it would be 17:00 UTC)
    - cron: '0 17 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub Actions tab

# Grant the Actions bot permission to push the CSV back to the repo
permissions:
  contents: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          
      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::httr
            any::jsonlite
            any::dplyr
            any::lubridate
            any::rsconnect
            any::shiny
            any::leaflet
            any::ggplot2
            any::DT
            any::blastula
            any::glue
          
      - name: Fetch Latest Atmotube Data
        env:
          ATMOTUBE_API_KEY: ${{ secrets.ATMOTUBE_API_KEY }}
        run: |
          Rscript fetch_daily_data.R
          
      - name: Commit and push updated CSV
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git config --global pull.rebase true
          
          git add atmotube_pro2_export_sample_default.csv
          
          # Only commit if there are actually changes in the CSV
          if git diff --staged --quiet; then
            echo "No new data to commit. Exiting cleanly."
          else
            git commit -m "Auto-update Atmotube data [skip ci]"
            # Use --autostash to safely hide our commit, pull from remote, put it back on top
            git pull --rebase --autostash origin main
            git push origin HEAD:main
          fi
          
      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
        run: |
          # Dynamically create the .Renviron file so shinyapps.io can read the email passwords
          echo "SMTP_USER=${SMTP_USER}" > .Renviron
          echo "SMTP_PASS=${SMTP_PASS}" >> .Renviron
          echo "SMTP_HOST=${SMTP_HOST}" >> .Renviron
          
          # Create deployment script block to handle authentication implicitly
          cat << 'EOF' > run_deploy.R
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          library(rsconnect)
          setAccountInfo(name=Sys.getenv("SHINYAPPS_NAME"),
                         token=Sys.getenv("SHINYAPPS_TOKEN"),
                         secret=Sys.getenv("SHINYAPPS_SECRET"))
          source("auto_deploy_app.R")
          EOF
          Rscript run_deploy.R
